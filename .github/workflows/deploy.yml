name: Deploy Lambdas
# trigger 
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        function: [
          Ian-getRooms,
          Ian-createBooking,
          Ian-updateRoom,
          Ian-deleteRoom,
          Ian-getBookings,
          Ian-getTopRevenueDate
          Ian-createEmployment,
          Ian-createPayment,
          Ian-createProfile,
          Ian-deleteBooking,
          Ian-deleteEmployment,
          Ian-deleteProfile,
          Ian-getAllGuests,
          Ian-getAllPayments,
          Ian-getBestSellingRooms,
          Ian-getBestSellingRoomsByRevenue,
          Ian-getBookingById,
          Ian-getEmployeesByShift,
          Ian-getEmployeesByStatus,
          Ian-getEmploymentById,
          Ian-getEmployments,
          Ian-getGuestById,
          Ian-getGuestsByMemberstatus,
          Ian-getPaymentByBookingId,
          Ian-getPaymentsByMethod,
          Ian-getPaymentsByStatus,
          Ian-getProfileByGender,
          Ian-getProfileById,
          Ian-getProfileByType,
          Ian-getProfiles,
          Ian-getRoomByRoomNumber,
          Ian-getRoomsHighestRevenue,
          Ian-getTopGuestPayment,
          Ian-updateEmployment,
          Ian-updateGuestMember,
          Ian-updateProfile,
        ]

    steps:
      - uses: actions/checkout@v3

      - name: Prepare function
        run: |
          mkdir deploy
          cp ${{ matrix.function }}.js deploy/index.js
          cp -r config deploy/config

          cd deploy
          npm init -y
          npm install pg

          zip -r function.zip .

      - name: Deploy to Lambda
        uses: appleboy/lambda-action@v0.1.9
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY }}
          aws_region: ap-southeast-2
          function_name: ${{ matrix.function }}
          zip_file: deploy/function.zip